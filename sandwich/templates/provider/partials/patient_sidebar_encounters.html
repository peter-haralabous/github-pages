{% load lucide %}

<div class="bg-white border border-gray-200 rounded-lg p-4">
  {# Back button to main navigation #}
  <button class="flex items-center gap-2 p-2 mb-4 rounded-lg hover:bg-gray-100 w-full text-left"
          hx-get="{% url 'providers:patient_sidebar_main' organization_id=organization.id patient_id=patient.id %}"
          hx-target="#patient-sidebar"
          hx-swap="innerHTML"
          hx-push-url="false">
    {% lucide "arrow-left" class="size-5 text-gray-600" %}
    <p class="text-gray-900 text-base font-medium">Encounters</p>
  </button>
  {# Encounters list #}
  <ul class="flex flex-col gap-1">
    {% for encounter in encounters %}
      <li class="flex h-12 items-center gap-4 rounded-lg px-4 cursor-pointer {% if selected_encounter_id == encounter.id|stringformat:'s' %}bg-blue-100{% else %}hover:bg-gray-100{% endif %}"
          hx-get="{% url 'providers:patient_encounter_content' organization_id=organization.id patient_id=patient.id encounter_id=encounter.id %}"
          hx-target="#patient-content"
          hx-swap="innerHTML"
          hx-push-url="false">
        <p class="text-sm truncate {% if selected_encounter_id == encounter.id|stringformat:'s' %}font-semibold text-gray-900{% else %}text-gray-700{% endif %}">
          {{ encounter.created_at|date:DJANGO_DATE_FORMAT }}
        </p>
      </li>
    {% empty %}
      <li class="flex h-12 items-center gap-4 rounded-lg px-4">
        <p class="text-sm text-gray-500">No encounters found.</p>
      </li>
    {% endfor %}
  </ul>
</div>
