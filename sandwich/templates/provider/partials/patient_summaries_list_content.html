{% load lucide %}

<div class="bg-white border border-gray-200 rounded-lg">
  {# Header #}
  <div class="p-4 border-b border-gray-200">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button hx-get="{% url 'providers:patient_nav_overview' organization_id=organization.id patient_id=patient.id %}"
                hx-target="closest div"
                hx-select="#patient-sidebar, #patient-content"
                hx-swap="multi:#patient-sidebar,#patient-content"
                hx-push-url="{% url 'providers:patient' organization_id=organization.id patient_id=patient.id %}"
                class="flex items-center justify-center p-2 rounded-lg hover:bg-gray-100">
          {% lucide "arrow-left" class="size-5 text-gray-600" %}
        </button>
        <h2 class="text-xl font-bold text-gray-900">All Summaries</h2>
      </div>
    </div>
  </div>
  {# Content #}
  <ul class="divide-y divide-gray-200">
    {% for summary in summaries %}
      <li class="p-4 sm:p-6 hover:bg-gray-50 cursor-pointer">
        <div class="flex justify-between items-center">
          <div class="flex-1">
            <p class="font-semibold text-gray-900">{{ summary.title }}</p>
            <p class="text-sm text-gray-600">{{ summary.created_at|date:DJANGO_DATE_FORMAT }}</p>
          </div>
          {% lucide "chevron-right" class="size-5 text-gray-400" %}
        </div>
      </li>
    {% empty %}
      <li class="p-4 sm:p-6 text-center text-gray-500">No summaries yet.</li>
    {% endfor %}
  </ul>
</div>
