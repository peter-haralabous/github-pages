{% load lucide %}

<div class="bg-white border border-gray-200 rounded-lg p-4">
  {# Header with back button #}
  <button class="flex items-center gap-2 p-2 mb-4 rounded-lg hover:bg-gray-100 w-full text-left"
          hx-get="{% url 'providers:patient_nav_overview' organization_id=organization.id patient_id=patient.id %}"
          hx-swap="none"
          hx-push-url="{% url 'providers:patient' organization_id=organization.id patient_id=patient.id %}">
    {% lucide "arrow-left" class="size-5 text-gray-600" %}
    <p class="text-gray-900 text-base font-medium">Summaries</p>
  </button>
  {# Summaries list #}
  <ul class="flex flex-col gap-1">
    {% for summary in summaries %}
      <li class="flex h-12 items-center gap-4 rounded-lg px-4 cursor-pointer {% if selected_summary_id == summary.id|stringformat:'s' %}bg-blue-100{% else %}hover:bg-gray-100{% endif %}">
        <p class="text-sm truncate {% if selected_summary_id == summary.id|stringformat:'s' %}font-semibold text-gray-900{% else %}text-gray-700{% endif %}">
          {{ summary.title }}
        </p>
      </li>
    {% empty %}
      <li class="flex h-12 items-center gap-4 rounded-lg px-4">
        <p class="text-sm text-gray-500">No summaries found.</p>
      </li>
    {% endfor %}
  </ul>
</div>
